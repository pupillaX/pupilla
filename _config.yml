title: Pupilla
description: "A multidisciplinary archive with the aim of building bridges and striving for unity in diversity."

# Custom domain configuration
baseurl: ""  # Empty for custom domain
url: "https://pupilla.org"  # Your custom domain
google_analytics: "G-VETQ7ZZ4FM"

# Site metadata
author: Pupilla Team
email: info@pupilla.org
twitter: pupillaorg
github: pupillax

# Collections
collections:
  pupilla-preprints:
    output: true
    permalink: /preprints/:name/
  pupilla-essays:
    output: true
    permalink: /essays/:name/

# Default settings for preprints and essays
defaults:
  - scope:
      path: ""
      type: pupilla-preprints
    values:
      layout: preprint
  - scope:
      path: ""
      type: pupilla-essays
    values:
      layout: essay
  - scope:
      path: ""
      type: pages
    values:
      layout: default

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Feed configuration — per-collection feeds + combined handled by custom feed.xml
feed:
  disable_in_development: false
  posts_limit: 20
  collections:
    pupilla-preprints:
      path: "/feed/pupilla-preprints.xml"
    pupilla-essays:
      path: "/feed/pupilla-essays.xml"

# SEO settings
lang: en_US
logo: /assets/images/logo.png
social:
  name: Pupilla
  links:
    - https://github.com/pupillax

# giscus comments + reactions (backed by GitHub Discussions).
# Setup: (1) make sure the repo is public, (2) enable Discussions in
# Settings, (3) install the giscus app (https://github.com/apps/giscus)
# on the repo, (4) go to https://giscus.app, enter pupillaX/pupilla, pick
# the "Comments" category, and copy the generated repo_id / category_id
# below. The Discussion section stays hidden until both IDs are filled in.
giscus:
  repo: "pupillaX/pupilla"
  repo_id: "R_kgDOPbA_TQ"              # <-- paste from giscus.app
  category: "Comments"                 # Discussions category to post under
  category_id: "DIC_kwDOPbA_Tc4C-N8P"  # <-- paste from giscus.app
  mapping: "pathname"
  reactions_enabled: 1
  theme: "light"
  lang: "en"

# Build settings
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Exclude from processing (removed CNAME from exclusions)
exclude:
  - node_modules
  - vendor
  - Gemfile
  - Gemfile.lock
  - README.md
  - .gitignore
  - .git
  - .sass-cache
  - _drafts
  - _templates            # mockups / templates, not for publishing
  - assets/pdfs/private    # private preview PDFs — never publish
  - "assets/pdfs/*.docx"   # source manuscripts — never publish
  - "*.docx"
  - jekyll.log
  - check-ssl.sh
  - restart-server.sh
  - start-server.sh
  - MULTI_LANGUAGE_PDF_GUIDE.md

# Include files
include:
  - _pages

# Sass settings
sass:
  sass_dir: _sass
  style: compressed

# Archive settings
archive:
  type: monthly
  layout: archive