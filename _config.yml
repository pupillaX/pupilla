title: Pupilla
description: "A multidisciplinary archive with the aim of building bridges and striving for unity in diversity."

# Custom domain configuration
baseurl: ""  # Empty for custom domain
url: "https://pupilla.org"  # Your custom domain
google_analytics: "G-VETQ7ZZ4FM"

# Site metadata
author: Pupilla Team
email: info@pupilla.org
twitter: pupillaorg
github: pupillax

# Collections
collections:
  pupilla-preprints:
    output: true
    permalink: /preprints/:name/
  pupilla-essays:
    output: true
    permalink: /essays/:name/

# Default settings for preprints and essays
defaults:
  - scope:
      path: ""
      type: pupilla-preprints
    values:
      layout: preprint
  - scope:
      path: ""
      type: pupilla-essays
    values:
      layout: essay
  - scope:
      path: ""
      type: pages
    values:
      layout: default

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Feed configuration — per-collection feeds + combined handled by custom feed.xml
feed:
  disable_in_development: false
  posts_limit: 20
  collections:
    pupilla-preprints:
      path: "/feed/pupilla-preprints.xml"
    pupilla-essays:
      path: "/feed/pupilla-essays.xml"

# SEO settings
lang: en_US
logo: /assets/images/logo.png
social:
  name: Pupilla
  links:
    - https://github.com/pupillax

# Build settings
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Exclude from processing (removed CNAME from exclusions)
exclude:
  - node_modules
  - vendor
  - Gemfile
  - Gemfile.lock
  - README.md
  - .gitignore
  - .git
  - .sass-cache
  - _drafts

# Include files
include:
  - _pages

# Sass settings
sass:
  sass_dir: _sass
  style: compressed

# Archive settings
archive:
  type: monthly
  layout: archive